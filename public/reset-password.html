<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Muhasabah Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 420px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #222;
      border-top-color: #C9A84C;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: #C9A84C;
      margin-bottom: 12px;
    }
    p {
      font-size: 0.95rem;
      line-height: 1.5;
      color: #999;
    }
    .fallback { display: none; }
    .fallback h1 { color: #C9A84C; }
    .fallback p { margin-top: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Opening Muhasabah Hub...</h1>
      <p>Redirecting to the app to reset your password.</p>
    </div>
    <div id="fallback" class="fallback">
      <h1>Reset Password</h1>
      <p>The app could not be opened. Please make sure Muhasabah Hub is installed, then try again.</p>
    </div>
  </div>
  <script>
    (function () {
      var params = window.location.search;
      var deepLink = 'muhasabahhub://qadhatracker/reset-password' + params;

      var fallbackTimer = setTimeout(function () {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('fallback').style.display = 'block';
      }, 2500);

      window.addEventListener('pagehide', function () {
        clearTimeout(fallbackTimer);
      });

      window.location.href = deepLink;
    })();
  </script>
</body>
</html>
